<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>录入成绩</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>
<div class="shell"><div th:replace="~{fragments/layout :: sidebar}"></div>
<main class="content">
<h1>录入成绩</h1>
<p class="lead" th:text="${selection['hxx_course_name11'] + ' / ' + selection['hxx_student_name11']}">成绩</p>
<form class="form-grid" method="post" action="/teacher/score/add">
    <input type="hidden" name="selectionId" th:value="${selection['hxx_selection_id11']}">
    <label>平时成绩<input name="usualScore" type="number" step="0.01" min="0" max="100" required></label>
    <label>期末成绩<input name="examScore" type="number" step="0.01" min="0" max="100" required></label>
    <button type="submit">提交成绩</button>
</form>
</main></div>
</body>
</html>
