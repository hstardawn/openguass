<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HuangxxMIS11 登录</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-visual">
        <div>
            <p class="eyebrow">Academic Affairs Platform</p>
            <h1>教务成绩管理系统</h1>
            <p>面向高校教学管理场景，统一支撑学生、教师、课程、成绩、申诉与审计工作。</p>
        </div>
        <div class="login-metrics">
            <span><strong>3</strong>角色工作台</span>
            <span><strong>统一</strong>教务数据</span>
            <span><strong>全程</strong>审计留痕</span>
        </div>
    </section>
    <section class="login-panel">
        <div class="login-brand">
            <span class="brand-mark">H</span>
            <div>
                <h1>高校教务管理系统</h1>
                <p>登录工作台</p>
            </div>
        </div>
        <div th:replace="~{fragments/layout :: messages}"></div>
        <form method="post" action="/login">
            <label>登录名
                <input name="loginName" required autofocus placeholder="请输入登录名">
            </label>
            <label>密码
                <input name="password" type="password" required placeholder="请输入密码">
            </label>
            <button type="submit">进入系统</button>
        </form>
        <p class="login-note">请使用学校分配的账号登录。忘记密码请联系系统管理员重置。</p>
    </section>
</main>
</body>
</html>
