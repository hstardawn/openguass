<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${title}">课程表单</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>
<div class="shell"><div th:replace="~{fragments/layout :: sidebar}"></div>
<main class="content">
<div th:replace="~{fragments/layout :: messages}"></div>
<section class="page-title">
    <p class="eyebrow">Course Catalog</p>
    <h1 th:text="${title}">课程表单</h1>
    <p>维护课程名称、学分、学时和考核方式。新增课程时编号由数据库自动生成。</p>
</section>
<form class="form-card" method="post" th:action="${edit} ? '/admin/courses/edit' : '/admin/courses/add'">
    <input th:if="${edit}" type="hidden" name="courseId" th:value="${row['hxx_course_id11']}">
    <section class="form-section">
        <h2>课程基本信息</h2>
        <div class="form-grid">
            <label th:if="${edit}">课程编号<input readonly th:value="${row['hxx_course_id11']}"></label>
            <div class="field-note" th:if="${!edit}"><strong>课程编号自动生成</strong><span>保存后系统会生成课程编号，无需手动填写。</span></div>
            <label class="required">课程名称<input name="courseName" required th:value="${row['hxx_course_name11']}" placeholder="请输入课程名称"></label>
            <label class="required">学分<input name="credit" type="number" min="0.5" step="0.5" required th:value="${row['hxx_credit11'] ?: 3.0}" placeholder="如 3.0"></label>
            <label class="required">课程学时<input name="period" type="number" min="1" required th:value="${row['hxx_period11'] ?: 48}" placeholder="如 48"></label>
        </div>
    </section>
    <section class="form-section">
        <h2>课程属性</h2>
        <div class="form-grid">
            <label class="required">考核方式<select name="examType" required><option th:selected="${row['hxx_exam_type11'] == '考试'}">考试</option><option th:selected="${row['hxx_exam_type11'] == '考查'}">考查</option></select></label>
            <label class="required">课程类型<select name="courseType" required><option th:selected="${row['hxx_course_type11'] == '必修'}">必修</option><option th:selected="${row['hxx_course_type11'] == '选修'}">选修</option><option th:selected="${row['hxx_course_type11'] == '通识'}">通识</option></select></label>
            <label class="wide">课程说明<input name="courseDesc" th:value="${row['hxx_course_desc11']}" placeholder="请输入课程说明"></label>
        </div>
    </section>
    <div class="form-actions">
        <button type="submit">保存</button>
        <a class="button secondary" href="/admin/courses">返回</a>
    </div>
</form>
</main></div>
</body>
</html>
