<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${title}">课程表单</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>
<div class="shell"><div th:replace="~{fragments/layout :: sidebar}"></div>
<main class="content">
<h1 th:text="${title}">课程表单</h1>
<form class="form-grid" method="post" th:action="${edit} ? '/admin/courses/edit' : '/admin/courses/add'">
    <label>课程编号<input name="courseId" required th:readonly="${edit}" th:value="${row['hxx_course_id11']}"></label>
    <label>课程名称<input name="courseName" required th:value="${row['hxx_course_name11']}"></label>
    <label>学分<input name="credit" type="number" step="0.5" required th:value="${row['hxx_credit11'] ?: 3.0}"></label>
    <label>学时<input name="period" type="number" required th:value="${row['hxx_period11'] ?: 48}"></label>
    <label>考核方式<select name="examType"><option>考试</option><option>考查</option></select></label>
    <label>课程类型<select name="courseType"><option>必修</option><option>选修</option><option>通识</option></select></label>
    <label>说明<input name="courseDesc" th:value="${row['hxx_course_desc11']}"></label>
    <button type="submit">保存</button>
</form>
</main></div>
</body>
</html>
