<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>一键导入学生</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>
<div class="shell">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/layout :: messages}"></div>
        <section class="page-hero">
            <div>
                <p class="eyebrow">Student Import</p>
                <h1>一键导入学生</h1>
                <p>粘贴学生名单 CSV 内容后提交，字段顺序与“新增学生”保持一致，系统会逐行创建学生账号。</p>
            </div>
        </section>

        <section class="panel">
            <h2>CSV 格式</h2>
            <pre class="code-sample">学号,姓名,性别,年龄,生源地编码,班级编码,手机号,学籍状态,入学日期
S2023998,测试一,男,20,R-XH,CL-CS2301,13899990001,在读,2023-09-01
S2023999,测试二,女,19,R-BL,CL-CS2302,13899990002,在读,2023-09-01</pre>
        </section>

        <form class="form-grid import-form" method="post" action="/admin/students/import">
            <label class="wide">导入内容
                <textarea name="importText" required spellcheck="false" placeholder="粘贴 CSV 内容，第一行可以是表头"></textarea>
            </label>
            <button type="submit">导入学生</button>
            <a class="button secondary" href="/admin/students">返回学生列表</a>
        </form>
    </main>
</div>
</body>
</html>
