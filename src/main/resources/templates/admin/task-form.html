<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${title}">教学任务表单</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>
<div class="shell"><div th:replace="~{fragments/layout :: sidebar}"></div>
<main class="content">
<h1 th:text="${title}">教学任务表单</h1>
<form class="form-grid" method="post" th:action="${edit} ? '/admin/tasks/edit' : '/admin/tasks/add'">
    <label>任务编号<input name="taskId" required th:readonly="${edit}" th:value="${row['hxx_task_id11']}"></label>
    <label>课程<select name="courseId"><option th:each="o:${options.courses}" th:value="${o.id}" th:text="${o.name}"></option></select></label>
    <label>教师<select name="teacherId"><option th:each="o:${options.teachers}" th:value="${o.id}" th:text="${o.name}"></option></select></label>
    <label>班级<select name="classId"><option th:each="o:${options.classes}" th:value="${o.id}" th:text="${o.name}"></option></select></label>
    <label>学期<select name="termId"><option th:each="o:${options.terms}" th:value="${o.id}" th:text="${o.name}"></option></select></label>
    <label>地点<input name="teachingPlace" th:value="${row['hxx_teaching_place11']}"></label>
    <label>最大人数<input name="maxCount" type="number" th:value="${row['hxx_max_count11'] ?: 60}"></label>
    <label>状态<select name="taskStatus"><option>未开始</option><option>开课中</option><option>已结束</option><option>取消</option></select></label>
    <button type="submit">保存</button>
</form>
</main></div>
</body>
</html>
